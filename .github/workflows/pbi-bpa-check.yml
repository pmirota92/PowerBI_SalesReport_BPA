name: Power BI Best Practice Check

on: [push, pull_request]

jobs:
  check-rules:
    runs-on: windows-latest
    steps:
      # 1. Pobranie kodu źródłowego Twojego raportu
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Pobranie najnowszej wersji Tabular Editor CLI (2.27.2)
      - name: Download Tabular Editor CLI
        run: |
          $url = "https://cdn.tabulareditor.com/files/TabularEditor.2.27.2.zip"
          Write-Host "Pobieranie Tabular Editor z: $url"
          Invoke-WebRequest -Uri $url -OutFile "TE.zip" -ErrorAction Stop
          Expand-Archive -Path "TE.zip" -DestinationPath "./TE"

# 3. Diagnostyka i Uruchomienie BPA
      - name: Run Best Practice Analyzer
        shell: pwsh
        run: |
          # 1. Sprawdźmy czy pliki istnieją (wynik zobaczysz w logach)
          Write-Host "--- DIAGNOSTYKA ŚCIEŻEK ---"
          Get-ChildItem -Recurse -Filter "model.bim" | Select-Object FullName
          Get-ChildItem -Filter "BPARules.json" | Select-Object FullName
          
          $modelPath = "$env:GITHUB_WORKSPACE\Sales_v2.SemanticModel\model.bim"
          $rulesPath = "$env:GITHUB_WORKSPACE\BPARules.json"
          $tePath = "$env:GITHUB_WORKSPACE\TE\TabularEditor.exe"

          Write-Host "--- URUCHAMIANIE TABULAR EDITOR ---"
          # Uruchomienie z pełnymi ścieżkami
          & $tePath "$modelPath" -A "$rulesPath" -V
